name: tribler-bittorrent
version: latest
summary: Decentralized BitTorrent client
description: >
  Open source decentralized BitTorrent client which allows anonymous peer-to-peer downloads by default.

grade: devel
confinement: devmode
base: core18

architectures:
  - build-on: amd64

parts:

  tribler:
    plugin: python
    python-version: python3
    source: https://github.com/xoriole/tribler.git
    source-branch: docker-run
    source-depth: 1
    requirements:
      - pip3-requirements-core.txt

    override-build: |
      VERSION=$(git describe --tags|cut -d- -f1,2)
      snapcraftctl set-version "$VERSION"

      cp -r ./ ${SNAPCRAFT_PART_INSTALL}/usr/share/tribler
      set -ex
      for dir in $SNAPCRAFT_PART_INSTALL/usr/lib/*/; do
        (cd $dir;
         if [ -f blas/libblas.so.3.* ]; then
           ln -s blas/libblas.so.3.* libblas.so.3
         fi
         if [ -f lapack/liblapack.so.3.* ]; then
           ln -s lapack/liblapack.so.3.* liblapack.so.3
         fi
         )
      done
      snapcraftctl build

    build-packages:
      - git
      - python3
      - python3-dev
      - build-essential
      - libssl-dev
      - libffi-dev
      - libxml2-dev
      - libxslt1-dev
      - zlib1g-dev
      - python3-setuptools
      - python3-pip
      - python3-libtorrent
      - python3-wheel
      - libsodium23
      - libblas3
      - libblas-dev
      - libxcomposite1
      - libxcursor1
      - libxinerama1
      - libatk1.0-0
      - libgtk2.0-0
      - liblapack3

    stage-packages:
      - git
      - python3
      - python3-dev
      - build-essential
      - libssl-dev
      - libffi-dev
      - libxml2-dev
      - libxslt1-dev
      - zlib1g-dev
      - python3-setuptools
      - python3-pip
      - python3-libtorrent
      - python3-wheel
      - libsodium23
      - libblas3
      - libblas-dev
      - libxcomposite1
      - libxcursor1
      - libxinerama1
      - libatk1.0-0
      - libgtk2.0-0
      - liblapack3
      - libx11-xcb1
      - libxcb-xkb1
      - libxcb-icccm4
      - libxcb-image0
      - libxcb-render-util0

apps:
  tribler-bittorrent:
    command: usr/bin/python3 ${SNAP}/usr/share/tribler/run_core.py
    plugs:
      - desktop
      - desktop-legacy
      - home
      - network
      - network-bind
      - unity7
      - pulseaudio
      - network-manager
